name: Validate agent card

# Validates both copies of the card (root + .well-known mirror) against:
#   1. The basic checks in scripts/agent-validate.py (reflectt v1 required fields)
#   2. The canonical reflectt v1 JSON schema (strict, type-checked)
#   3. Byte-equality between the two copies (drift guard)

on:
  push:
    branches: [main]
    paths:
      - 'agent.json'
      - '.well-known/agent.json'
      - 'examples/**'
      - 'scripts/agent-validate.py'
      - '.github/workflows/validate-card.yml'
  pull_request:
    paths:
      - 'agent.json'
      - '.well-known/agent.json'
      - 'examples/**'
      - 'scripts/agent-validate.py'
      - '.github/workflows/validate-card.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate agent.json against reflectt v1 spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install jsonschema (for full canonical-schema check)
        run: pip install jsonschema

      - name: Fetch canonical reflectt v1 schema
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/reflectt/agent-identity-kit/main/schema/agent.schema.json \
            -o /tmp/agent.schema.json
          test -s /tmp/agent.schema.json || (echo "Fetched schema is empty" && exit 1)

      - name: agent.json — basic validator (permissive)
        run: python3 scripts/agent-validate.py ./agent.json

      - name: agent.json — basic validator (strict)
        run: python3 scripts/agent-validate.py --strict ./agent.json

      - name: agent.json — full canonical schema check
        run: python3 scripts/agent-validate.py --schema /tmp/agent.schema.json ./agent.json

      - name: .well-known/agent.json — basic validator (permissive)
        run: python3 scripts/agent-validate.py ./.well-known/agent.json

      - name: .well-known/agent.json — basic validator (strict)
        run: python3 scripts/agent-validate.py --strict ./.well-known/agent.json

      - name: .well-known/agent.json — full canonical schema check
        run: python3 scripts/agent-validate.py --schema /tmp/agent.schema.json ./.well-known/agent.json

      - name: Verify the two copies are byte-identical (drift guard)
        run: |
          if ! diff -q <(jq -S . agent.json) <(jq -S . .well-known/agent.json) > /dev/null; then
            echo "FAIL: agent.json and .well-known/agent.json have drifted."
            diff <(jq -S . agent.json) <(jq -S . .well-known/agent.json) | head -40
            exit 1
          fi
          echo "OK: both copies are identical."

      # ── GitHub Pages deploy smoke test ─────────────────────────────────
      # GitHub Pages silently strips dot-prefixed directories (.well-known,
      # .github) from the published site unless .nojekyll is at the repo root.
      # The validators above check the in-repo file; this checks that the
      # deployed URL is actually serving it. A passing in-repo validation
      # doesn't prove the deploy worked — Pages can rebuild successfully and
      # still 404 on dot-directories.
      #
      # 2026-06-26: caught when the .well-known/ directory was 404 even
      # though the file existed in the repo and validators passed. The
      # Pages build status showed "built" without errors. CI was passing
      # while the public URL was broken.
      #
      # See TOOLS.md § "GitHub Pages" for the lesson.
      - name: Wait for Pages rebuild to settle
        run: sleep 30

      - name: Pages — canonical .well-known/agent.json is served (200 + JSON)
        run: |
          status=$(curl -sI -o /dev/null -w '%{http_code}' \
            https://novalux12.github.io/agent-card/.well-known/agent.json)
          ctype=$(curl -sI -o /dev/null -w '%{content_type}' \
            https://novalux12.github.io/agent-card/.well-known/agent.json)
          if [ "$status" != "200" ] || [[ "$ctype" != application/json* ]]; then
            echo "FAIL: canonical .well-known/agent.json returned ${status} ${ctype}"
            echo "Expected: 200 application/json"
            exit 1
          fi
          echo "OK: .well-known/agent.json served as ${status} ${ctype}"

      - name: Pages — .well-known/ directory URL renders (200 + HTML)
        run: |
          status=$(curl -sI -o /dev/null -w '%{http_code}' \
            https://novalux12.github.io/agent-card/.well-known/)
          ctype=$(curl -sI -o /dev/null -w '%{content_type}' \
            https://novalux12.github.io/agent-card/.well-known/)
          if [ "$status" != "200" ] || [[ "$ctype" != text/html* ]]; then
            echo "FAIL: .well-known/ directory URL returned ${status} ${ctype}"
            echo "Expected: 200 text/html"
            exit 1
          fi
          echo "OK: .well-known/ directory URL served as ${status} ${ctype}"

      - name: Pages — deployed canonical copy matches repo file (drift guard)
        run: |
          curl -fsSL https://novalux12.github.io/agent-card/.well-known/agent.json \
            | jq -S . > /tmp/served.json
          jq -S . .well-known/agent.json > /tmp/local.json
          if ! diff -q /tmp/local.json /tmp/served.json > /dev/null; then
            echo "FAIL: served .well-known/agent.json differs from repo file."
            diff /tmp/local.json /tmp/served.json | head -40
            exit 1
          fi
          echo "OK: served canonical copy matches repo file."

      - name: examples/agent-kestrel.json — basic validator (permissive)
        run: python3 scripts/agent-validate.py ./examples/agent-kestrel.json

      - name: examples/agent-kestrel.json — strict basic validator
        run: python3 scripts/agent-validate.py --strict ./examples/agent-kestrel.json

      - name: examples/agent-kestrel.json — full canonical schema check (strict)
        run: python3 scripts/agent-validate.py --strict --schema /tmp/agent.schema.json ./examples/agent-kestrel.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: example-consumers/parse.py — run against the card
        run: python3 example-consumers/parse.py ./agent.json || python3 example-consumers/parse.py file://$PWD/agent.json

      - name: example-consumers/parse.js — run against the card
        run: node example-consumers/parse.js ./agent.json || node example-consumers/parse.js file://$PWD/agent.json

      - name: Summary
        if: always()
        run: |
          echo "Card version: $(jq -r .x_novalux12_card_version agent.json)"
          echo "Spec version:  $(jq -r .version agent.json)"
          echo "Agent name:    $(jq -r .agent.name agent.json)"
          echo "Capabilities:  $(jq '.capabilities | length' agent.json)"
          echo "Example card:  $(jq -r .agent.name examples/agent-kestrel.json) ($(jq '.capabilities | length' examples/agent-kestrel.json) capabilities)"
